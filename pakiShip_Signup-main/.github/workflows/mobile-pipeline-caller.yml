# ──────────────────────────────────────────────────────────────
# Mobile Pipeline Caller (unified)
# Copy this file into the target repo at:
#   .github/workflows/master-pipeline-mobile.yml
#
# Works for Expo + TypeScript, Kotlin/Android, and mixed repos.
# Also used by MB (micro-backend) repositories.
# The pipeline_mode input controls which SYSTEMS_JSON variable
# is read (auto = picks multi if available, else single).
#
# ── Required repository variables ──────────────────────────────
# Set MOBILE_SINGLE_SYSTEMS_JSON (or MOBILE_MULTI_SYSTEMS_JSON)
# as a repository variable.
#
# Minimal config (all other fields have sensible defaults):
#
# { "name": "MyApp-Mobile", "dir": ".", "mobile_stack": "expo" }
#
# Optional overrides (showing defaults):
#   enable_android_build: true   — Local Android build (Detox debug APK)
#   enable_ios_build: true       — Local iOS simulator build (Detox debug .app)
#   enable_lint: true
#   enable_security_scan: true
#   enable_governance: true
#   coverage_threshold: 80
#
# Expo systems must be TypeScript-based:
#   tsconfig.json + strict mode
# Builds are local (xcodebuild / Gradle) — no EAS or EXPO_TOKEN needed.
# Detox E2E tests consume build artifacts from the build stage.
# SonarCloud runs once at the master mobile pipeline level, and Detox
# runs by default for Expo systems.
# ──────────────────────────────────────────────────────────────
name: "Master Pipeline — Mobile"

on:
  push:
    branches: [test, uat, main]
  pull_request:
    branches: [test, uat, main]
  workflow_dispatch:
    inputs:
      pipeline_mode:
        description: "Pipeline mode (auto|single|multi)"
        type: choice
        options: [auto, single, multi]
        default: auto
      enable_lint:
        description: "Run lint checks"
        type: boolean
        default: true
      enable_security_scan:
        description: "Run security scan"
        type: boolean
        default: true
      enable_sonar:
        description: "Run SonarCloud analysis"
        type: boolean
        default: true
      enable_governance:
        description: "Run governance checks (Kotlin)"
        type: boolean
        default: true
      enable_grafana_k6:
        description: "Run Grafana k6 cloud checks"
        type: boolean
        default: false
      k6_script_path:
        description: "Path to k6 script or performance tests directory"
        type: string
        default: "tests/performance"
      k6_base_url:
        description: "Optional base URL for k6"
        type: string
        default: ""
      k6_run_only_on_branch:
        description: "Branch allowed for k6 execution"
        type: string
        default: "test,uat,main"
      run_deploy:
        description: "Run deploy jobs"
        type: boolean
        default: true
      run_promotion:
        description: "Run PR promotion jobs"
        type: boolean
        default: true
      dry_run:
        description: "Preview-only mode (skip version tag push)"
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  packages: write
  security-events: write

jobs:
  call-orchestrator:
    uses: ImplementSprint/central-workflow/.github/workflows/master-pipeline-mobile.yml@main
    with:
      pipeline_mode: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.pipeline_mode || 'auto' }}
      enable_lint: ${{ github.event_name == 'workflow_dispatch' && fromJSON(github.event.inputs.enable_lint || 'true') || true }}
      enable_security_scan: ${{ github.event_name == 'workflow_dispatch' && fromJSON(github.event.inputs.enable_security_scan || 'true') || true }}
      enable_sonar: ${{ github.event_name == 'workflow_dispatch' && fromJSON(github.event.inputs.enable_sonar || 'true') || true }}
      enable_governance: ${{ github.event_name == 'workflow_dispatch' && fromJSON(github.event.inputs.enable_governance || 'true') || true }}
      enable_grafana_k6: ${{ github.event_name == 'workflow_dispatch' && fromJSON(github.event.inputs.enable_grafana_k6 || 'false') || false }}
      k6_script_path: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.k6_script_path || 'tests/performance' }}
      k6_base_url: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.k6_base_url || '' }}
      k6_run_only_on_branch: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.k6_run_only_on_branch || 'test,uat,main' }}
      run_deploy: ${{ github.event_name == 'workflow_dispatch' && fromJSON(github.event.inputs.run_deploy || 'true') || github.event_name == 'push' }}
      run_promotion: ${{ github.event_name == 'workflow_dispatch' && fromJSON(github.event.inputs.run_promotion || 'true') || github.event_name == 'push' }}
      dry_run: ${{ github.event_name == 'workflow_dispatch' && fromJSON(github.event.inputs.dry_run || 'false') || false }}
    secrets: inherit
